services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ncba
      POSTGRES_USER: ncba
      POSTGRES_PASSWORD: ncba_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:                      
      test: ["CMD-SHELL", "pg_isready -U ncba -d ncba"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  influxdb:
    image: influxdb:2.7
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: ncba
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry
    volumes:
      - influxdb_data:/var/lib/influxdb2

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  snort:
    image: ciscotalos/snort3
    container_name: snort
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    user: root
    volumes:
      - ./logs:/var/log/snort
    entrypoint: [""]
    command: [
      "/home/snorty/snort3/bin/snort",
      "-v",
      "-i", "wlan0",
      "-c", "/home/snorty/snort3/etc/snort/snort.lua",
      "-A", "alert_fast",
      "-l", "/var/log/snort"
    ]
    tty: true
    stdin_open: true


  spire-server:
    image: ghcr.io/spiffe/spire-server:1.9.0
    restart: unless-stopped
    hostname: spire-server
    ports:
      - "8081:8081"
    volumes:
      - ./spire-server.conf:/opt/spire/conf/server/server.conf:ro
      - spire_server_data:/opt/spire/data
    command: ["-config", "/opt/spire/conf/server/server.conf"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/opt/spire/bin/spire-server", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 5

  spire-agent:
    image: ghcr.io/spiffe/spire-agent:1.9.0
    restart: unless-stopped
    privileged: true  
    pid: host         
    environment:
      - SPIRE_AGENT_JOIN_TOKEN=4f8f6899-7880-4102-8363-6f58a00c85d5
    volumes:
      - ./spire-agent.conf:/opt/spire/conf/agent/agent.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro  
      - spire_agent_data:/opt/spire/data
    command: [
      "-config", "/opt/spire/conf/agent/agent.conf",
      "-joinToken", "4f8f6899-7880-4102-8363-6f58a00c85d5"
    ]
    depends_on:
      spire-server:
        condition: service_healthy

volumes:
  postgres_data:
  influxdb_data:
  spire_server_data:
  spire_agent_data: